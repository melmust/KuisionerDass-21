<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuesioner DASS-21</title>
    <style>
        /* ... semua style sama seperti sebelumnya ... */
        .debug-panel {
            background: #1a202c;
            color: #68d391;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 20px;
            display: none;
            max-height: 300px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .debug-panel.show {
            display: block;
        }
        .btn-debug {
            background: #2d3748;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }
        .btn-debug:hover {
            background: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ... semua konten sama seperti sebelumnya ... -->
        
        <!-- Tambahkan tombol debug -->
        <button type="button" class="btn-debug" id="debugBtn">
            🐛 Tampilkan Debug
        </button>
        
        <div class="debug-panel" id="debugPanel"></div>
        
        <div class="footer">
            <p>© 2026 Penelitian Kesehatan Mental | Data 100% Rahasia</p>
        </div>
    </div>

    <script>
        // DASS-21 Questions (sama seperti sebelumnya)
        const questions = [
            "Saya merasa sulit untuk menenangkan diri",
            "Saya merasa rongga mulut saya kering",
            "Saya sama sekali tidak dapat merasakan perasaan positif",
            "Saya mengalami kesulitan bernapas meskipun tidak sedang melakukan aktivitas fisik",
            "Saya sulit mendapatkan semangat untuk melakukan sesuatu",
            "Saya cenderung bertindak dan bereaksi berlebihan terhadap situasi",
            "Saya mengalami gemetaran misal pada tangan",
            "Saya merasa energi saya terkuras karena terlalu gugup",
            "Saya merasa khawatir terhadap situasi yang membuat saya panik dan melakukan hal yang bodoh",
            "Saya merasa tidak ada lagi yang bisa saya harapkan, merasa tidak memiliki masa depan",
            "Saya merasa gelisah",
            "Saya merasa sulit untuk rileks",
            "Saya merasa sedih dan murung",
            "Saya sulit untuk bersabar dalam menghadapi gangguan yang terjadi ketika sedang melakukan sesuatu",
            "Saya mudah menjadi panik",
            "Saya tidak bisa merasa antusias terhadap sesuatu hal",
            "Saya merasa diri saya tidak berharga",
            "Saya cenderung mudah merasa tersinggung",
            "Saya menyadari detak jantung saya meskipun tidak sedang melakukan aktivitas fisik",
            "Saya merasa ketakutan tanpa alasan yang jelas",
            "Saya merasa hidup ini tidak berarti atau bermakna"
        ];

        const options = [
            { value: 0, label: "Tidak Pernah" },
            { value: 1, label: "Kadang-kadang" },
            { value: 2, label: "Sering" },
            { value: 3, label: "Sangat Sering" }
        ];

        // 🔴 GANTI DENGAN URL APPS SCRIPT ANDA!
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQAgVVOHKPeBPEQh1o0zUT66shZRjqVilVFXiy76y_KvRtKNGZxzEBQ4jxfvuWn9cR/exec';

        // Debug function
        function debugLog(message, data = null) {
            const panel = document.getElementById('debugPanel');
            const timestamp = new Date().toISOString();
            let log = `[${timestamp}] ${message}`;
            if (data) {
                log += `\n${JSON.stringify(data, null, 2)}`;
            }
            panel.textContent += log + '\n\n';
            panel.scrollTop = panel.scrollHeight;
            console.log(message, data);
        }

        // Toggle debug panel
        document.getElementById('debugBtn').addEventListener('click', function() {
            const panel = document.getElementById('debugPanel');
            panel.classList.toggle('show');
            if (panel.classList.contains('show')) {
                this.textContent = '🐛 Sembunyikan Debug';
            } else {
                this.textContent = '🐛 Tampilkan Debug';
            }
        });

        // Render questions (sama seperti sebelumnya)
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.innerHTML = `
                    <div class="question-text">${index + 1}. ${q}</div>
                    <div class="options">
                        ${options.map(opt => `
                            <label>
                                <input type="radio" name="q${index}" value="${opt.value}" required>
                                ${opt.label}
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Show/hide custom input fields (sama seperti sebelumnya)
        document.getElementById('pendidikan').addEventListener('change', function() {
            const group = document.getElementById('pendidikanLainGroup');
            if (this.value === 'Lainnya') {
                group.style.display = 'block';
                document.getElementById('pendidikanLain').required = true;
            } else {
                group.style.display = 'none';
                document.getElementById('pendidikanLain').required = false;
            }
        });

        document.getElementById('lingkungan').addEventListener('change', function() {
            const group = document.getElementById('lingkunganLainGroup');
            if (this.value === 'Lainnya') {
                group.style.display = 'block';
                document.getElementById('lingkunganLain').required = true;
            } else {
                group.style.display = 'none';
                document.getElementById('lingkunganLain').required = false;
            }
        });

        // Progress bar (sama seperti sebelumnya)
        function updateProgress() {
            const form = document.getElementById('dassForm');
            const inputs = form.querySelectorAll('input[required], select[required]');
            let filled = 0;
            inputs.forEach(input => {
                if (input.type === 'radio') {
                    const name = input.name;
                    const checked = document.querySelector(`input[name="${name}"]:checked`);
                    if (checked) filled++;
                } else if (input.value && input.value.trim() !== '') {
                    filled++;
                }
            });
            const total = inputs.length;
            const percent = Math.min((filled / total) * 100, 100);
            document.getElementById('progressFill').style.width = percent + '%';
        }

        document.addEventListener('change', updateProgress);
        document.addEventListener('input', updateProgress);

        // ============================================================
        // FORM SUBMISSION - DENGAN DEBUG LENGKAP
        // ============================================================
        document.getElementById('dassForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            debugLog('🚀 FORM DISUBMIT');
            
            const alert = document.getElementById('alert');
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            
            // Clear previous alerts
            alert.style.display = 'none';
            
            // Collect data
            debugLog('📝 Mengumpulkan data form...');
            
            const usia = document.getElementById('usia').value;
            const noHP = document.getElementById('noHP').value;
            const jenisKelamin = document.querySelector('input[name="jenisKelamin"]:checked')?.value || '';
            let pendidikan = document.getElementById('pendidikan').value;
            if (pendidikan === 'Lainnya') {
                pendidikan = document.getElementById('pendidikanLain').value;
            }
            let lingkungan = document.getElementById('lingkungan').value;
            if (lingkungan === 'Lainnya') {
                lingkungan = document.getElementById('lingkunganLain').value;
            }

            debugLog('📊 Data diri:', { usia, noHP, jenisKelamin, pendidikan, lingkungan });

            // Validate usia
            if (parseInt(usia) < 17) {
                alert.className = 'alert error';
                alert.innerHTML = '⚠️ Usia harus minimal 17 tahun.';
                alert.style.display = 'block';
                debugLog('❌ Validasi gagal: Usia < 17');
                return;
            }

            // Validate noHP
            if (!/^[0-9]{10,13}$/.test(noHP.replace(/[^0-9]/g, ''))) {
                alert.className = 'alert error';
                alert.innerHTML = '⚠️ Nomor WhatsApp tidak valid. Masukkan 10-13 digit angka.';
                alert.style.display = 'block';
                debugLog('❌ Validasi gagal: No HP tidak valid');
                return;
            }

            // Collect DASS answers
            const answers = [];
            let allAnswered = true;
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (!selected) {
                    allAnswered = false;
                    break;
                }
                answers.push(parseInt(selected.value));
            }

            if (!allAnswered) {
                alert.className = 'alert error';
                alert.innerHTML = '⚠️ Mohon jawab semua pertanyaan DASS-21.';
                alert.style.display = 'block';
                debugLog('❌ Validasi gagal: Ada pertanyaan belum dijawab');
                return;
            }

            debugLog('✅ Validasi berhasil!');
            debugLog('📊 Jawaban DASS:', answers);

            // Prepare data
            const data = {
                usia,
                noHP,
                jenisKelamin,
                pendidikan,
                lingkungan,
                answers: answers.join(',')
            };
            body: JSON.stringify(data)
            debugLog('📦 Data siap dikirim:', data);

            // Show loading
            submitBtn.disabled = true;
            loading.style.display = 'block';

            try {
                debugLog('📤 Mengirim data ke:', APPS_SCRIPT_URL);
                
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                debugLog('📥 Response status:', response.status);

                const result = await response.json();
                debugLog('📥 Response body:', result);

                if (result.status === 'success') {
                    alert.className = 'alert success';
                    alert.innerHTML = `
                        ✅ <strong>Terima kasih!</strong> Data Anda berhasil dikirim.<br>
                        📊 Total skor DASS: <strong>${answers.reduce((a,b) => a+b, 0)}</strong><br>
                        🎁 Jangan lupa, giveaway Rp25.000 untuk 20 orang beruntung!<br>
                        <span style="font-size: 13px;">Pemenang akan dihubungi via WhatsApp.</span>
                    `;
                    alert.style.display = 'block';
                    debugLog('✅ Sukses! Data tersimpan di sheet.');
                    
                    // Reset form
                    this.reset();
                    document.getElementById('progressFill').style.width = '0%';
                    
                    // Scroll to top
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    throw new Error(result.message || 'Gagal menyimpan data');
                }

            } catch (error) {
                debugLog('❌ ERROR:', error.message);
                debugLog('❌ Stack:', error.stack);
                
                alert.className = 'alert error';
                alert.innerHTML = `
                    ⚠️ Gagal mengirim data.<br>
                    <span style="font-size: 13px;">Error: ${error.message}</span><br>
                    <span style="font-size: 12px; color: #718096;">
                        Cek panel Debug untuk detail. Pastikan URL Apps Script benar.
                    </span>
                `;
                alert.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Initialize
        renderQuestions();
        updateProgress();

        // Log URL saat load
        debugLog('🔗 Apps Script URL:', APPS_SCRIPT_URL);
        debugLog('✅ Halaman siap digunakan!');
    </script>
</body>
</html>
